      - name: Run Media Sync Script
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
          MAX_UPLOADS: 30 
        run: |
          cd media_bot
          python media_to_gdrive.py

      - name: Run Drive Duplicates Cleaner Script
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
        run: |
          cd cleaner_bot
          python clean_duplicates.py

      - name: Commit and Push state changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add media_bot/media_state.json
          
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update media state [skip ci]"
          git push

