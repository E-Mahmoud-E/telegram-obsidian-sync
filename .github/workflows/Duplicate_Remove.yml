name: Drive Duplicates Cleaner

on:
  schedule:
    - cron: '0 0 * * *'  # يعمل تلقائياً مرة واحدة يومياً عند منتصف الليل (يمكنك تعديله)
  workflow_dispatch:      # يسمح لك بتشغيل عملية التنظيف يدوياً في أي وقت من واجهة GitHub

jobs:
  run-cleaner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Run Drive Duplicates Cleaner Script
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
        run: |
          cd cleaner_bot
          python clean_duplicates.py
          
