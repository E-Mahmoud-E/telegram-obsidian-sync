name: Hourly Telegram AI Analyzer

on:
  schedule:
    - cron: '0 * * * *'  # يعمل تلقائياً بدقة رأس كل ساعة
  workflow_dispatch:      # يسمح لك بالتشغيل الفوري يدوياً للتجربة في أي وقت

jobs:
  analyze-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon

      - name: Run AI Audit Engine
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python analyzer.py

      - name: Commit and Push state and notes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # إضافة ملفات الحالة والتقارير والنوتات المحدثة
          git add analyzer_state.json github_dashboard/ obsidian_vault/
          
          # الدفع فقط في حال وجود تغييرات فعلية لمنع أخطاء الـ Action
          git diff --quiet && git diff --staged --quiet || git commit -m "Hourly AI update for channels and knowledge base [skip ci]"
          git push

