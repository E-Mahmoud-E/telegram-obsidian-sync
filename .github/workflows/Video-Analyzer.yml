name: Run Video Link Analyzer

on:
  schedule:
    - cron: '0 */5 * * *' # سيعمل السكربت تلقائياً كل 5 ساعات
  workflow_dispatch: # يتيح لك تشغيل السكربت يدوياً من موقع GitHub للتجربة في أي وقت

jobs:
  run-analyzer:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Script
      env:
        TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
        TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID2 }} # تم التعديل هنا للمتغير الجديد
        DRIVE_TOKEN_JSON: ${{ secrets.DRIVE_TOKEN_JSON }}
      run: python app.py
