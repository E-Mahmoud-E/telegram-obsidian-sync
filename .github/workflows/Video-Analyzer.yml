name: Run Video Link Analyzer

on:
  schedule:
    - cron: '0 */5 * * *' # سيعمل السكربت تلقائياً كل 5 ساعات
  workflow_dispatch: # يتيح لك تشغيل السكربت يدوياً من موقع GitHub للتجربة في أي وقت

jobs:
  run-analyzer:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # إصدار حديث ومستقر ومدعوم من مكتبات جوجل وتليجرام

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f "Obsidian-Videos/requirements.txt" ]; then
          pip install -r Obsidian-Videos/requirements.txt
        else
          pip install -r requirements.txt
        fi

    - name: Execute Script
      working-directory: ./Obsidian-Videos # التوجيه للدخول إلى مجلد الأداة الفرعي
      env:
        TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
        TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID2 }} # يمرر قيمة DRIVE_FOLDER_ID2 من السيكرتس إلى الكود باسم DRIVE_FOLDER_ID
        DRIVE_TOKEN_JSON: ${{ secrets.DRIVE_TOKEN_JSON }}
      run: python app.py
