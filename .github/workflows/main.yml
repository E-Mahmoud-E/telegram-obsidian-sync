name: Telegram to Obsidian Sync

on:
  schedule:
    - cron: '0 */6 * * *' # سيعمل تلقائياً كل 6 ساعات
  workflow_dispatch: # يتيح لك تشغيله يدوياً بأي وقت كزر تجربة

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Script
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: python main.py

      - name: Commit and Push changes (Save last_id)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add channels_state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update last processed message IDs" && git push)
          
