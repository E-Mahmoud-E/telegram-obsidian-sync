name: Telegram to Obsidian Auto Sync

on:
  schedule:
    - cron: '0 */6 * * *' # يعمل تلقائياً كل 6 ساعات
  workflow_dispatch:      # يسمح لك بتشغيل السكربت يدوياً من واجهة GitHub

jobs:
  run-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # إعطاء الصلاحية لـ GitHub لحفظ حالة القناة وملف التوكن

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv requests

      - name: Create Google Credentials Files
        run: |
          echo '${{ secrets.OAUTH_CREDENTIALS_JSON }}' > oauth_credentials.json
          echo '${{ secrets.TOKEN_JSON }}' > token.json

      - name: Run Sync Script
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          MAX_UPLOADS: 10
        run: python main.py

      - name: Commit and Push state changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add channels_state.json token.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update state and token"
          git push
